<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — BodyWise AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #030712;
      --bg-surface: rgba(17, 24, 39, 0.45);
      --border: rgba(255, 255, 255, 0.06);
      --cyan: #00e5be;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Instrument Sans', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    /* Ambient background mesh */
    .bg-mesh {
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse 60% 45% at 0% 0%, rgba(0, 229, 190, 0.05) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 100% 100%, rgba(167, 139, 250, 0.04) 0%, transparent 60%),
        linear-gradient(180deg, #020617 0%, #030712 100%);
      z-index: 0;
      pointer-events: none;
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
      background-size: 56px 56px;
      z-index: 1;
      pointer-events: none;
    }

    /* Glass card container */
    .card {
      position: relative;
      z-index: 10;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 30px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(20px) saturate(1.3);
      -webkit-backdrop-filter: blur(20px) saturate(1.3);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      padding: 1px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .icon-wrapper {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: rgba(0, 229, 190, 0.06);
      border: 1px solid rgba(0, 229, 190, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      position: relative;
      box-shadow: 0 0 20px rgba(0, 229, 190, 0.05);
      animation: pulseGlow 2s infinite ease-in-out;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 24px;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
      line-height: 1.25;
    }

    p {
      font-size: 14.5px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .btn-retry {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 24px;
      background: linear-gradient(135deg, #00c9a7, #0ea5e9);
      color: #030712;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0, 229, 190, 0.25);
      transition: all 0.2s ease;
    }
    .btn-retry:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0, 229, 190, 0.4);
    }
    .btn-retry:active {
      transform: translateY(0);
      scale: 0.98;
    }

    /* Offline Status Indicator */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: rgba(248, 113, 113, 0.08);
      border: 1px solid rgba(248, 113, 113, 0.15);
      color: #f87171;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background-color: #f87171;
      border-radius: 50%;
      animation: pulseDot 1.5s infinite ease-in-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(0, 229, 190, 0.05); }
      50% { box-shadow: 0 0 32px rgba(0, 229, 190, 0.15); }
    }

    @keyframes pulseDot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="bg-grid"></div>
  
  <div class="card">
    <div class="status-badge">
      <span class="status-dot"></span>
      Offline Mode
    </div>
    
    <div class="icon-wrapper">📶</div>
    
    <h1>No Connection</h1>
    <p>We couldn't reach the server. BodyWise AI is ready to load offline pages, but active internet connectivity is needed for live syncs.</p>
    
    <button class="btn-retry" onclick="retryConnection()">
      Try Reconnecting
    </button>
  </div>

  <script>
    function retryConnection() {
      // Show spinner state or reload immediately
      const btn = document.querySelector('.btn-retry');
      btn.innerText = 'Checking...';
      window.location.reload();
    }

    // Auto-reload when connection is restored
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
